<div class="lancamento-page"> <h2>Gerenciamento de Lançamentos</h2>

    <div class="top-actions">
        <div class="search-bar">
            <input 
                type="text" 
                placeholder="Pesquisar por conta ou status..."
                [(ngModel)]="termoPesquisa" 
                (ngModelChange)="aplicarFiltro()">
            <i class="material-icons search-icon"></i>
        </div>

        <button class="btn btn-primary" (click)="abrirFormularioCadastro()">
            <i class="material-icons"></i> Adicionar Novo Lançamento
        </button>
    </div>

    <div class="contas-list">
        <table *ngIf="lancamentosFiltrados.length > 0">
            <thead>
                <tr>
                    <th>Conta Base</th>
                    <th>Vencimento</th>
                    <th>Valor</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let l of lancamentosFiltrados">
                    <td>{{ l.nomeConta }}</td>
                    <td>{{ l.dataVencimento | date:'dd/MM/yyyy' }}</td>
                    <td>{{ l.valor | currency:'BRL' }}</td>
                    <td>
                        <span [ngClass]="{
                            'status-ativo': l.statusReal === 'Pago' || l.statusReal === 'Recebido',
                            'status-inativo': l.statusReal === 'Pendente'
                        }">{{ l.statusReal }}</span>
                    </td>
                    <td>
                        <button class="btn btn-icon" (click)="editarLancamento(l)">
                            <i class="material-icons">edit</i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>

        <p *ngIf="lancamentosFiltrados.length === 0" class="no-results">Nenhum lançamento encontrado.</p>
    </div>

    <div *ngIf="isFormularioAberto" class="form-modal-overlay">
        <div class="form-card">
            <app-lancamentos-form
                [lancamentoEdicao]="lancamentoEmEdicao"
                (salvar)="salvarLancamento($event)"
                (fechar)="fecharFormulario()">
            </app-lancamentos-form>
        </div>
    </div>
</div>
