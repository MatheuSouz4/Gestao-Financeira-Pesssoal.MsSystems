<div class="form-container">
    <h3>{{ isEditMode ? 'Editar Conta' : 'Nova Conta' }}</h3>

<form [formGroup] = "contaForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
        
        <label for="nome">Nome da Conta</label>
        <input id="nome" type="text" formControlName="nome">
    </div>

    <div class="form-group">
        <label>Tipo</label>
        <div class="radio-group">
            <label *ngFor="let tipo of tiposConta">
                <input type="radio" [value]="tipo" formControlName="tipo">
                {{ tipo === 'RECEITA' ? 'Receita' : 'Despesa' }}
            </label>
        </div>
    </div>

    <ng-container *ngIf="contaForm.get('tipo')?.value === 'RECEITA'">
        <div class="form-group">
            <label for="clienteId">Cliente (Receita)</label>
            <select id="clienteId" formControlName="clienteId">
                <option [ngValue]="null">Selecione um Cliente</option>
                <option *ngFor="let cliente of clientes" [ngValue]="cliente.id">{{ cliente.nomeOuNomeFantasia }}</option>
            </select>
        </div>
    </ng-container>

    <ng-container *ngIf="contaForm.get('tipo')?.value === 'DESPESA'">
        <div class="form-group">
            <label for="fornecedorId">Fornecedor (Despesa)</label>
            <select id="fornecedorId" formControlName="fornecedorId">
                <option [ngValue]="null">Selecione um Fornecedor</option>
                <option *ngFor="let fornecedor of fornecedores" [ngValue]="fornecedor.id">{{ fornecedor.nomeOuNomeFantasia }}</option>
            </select>
        </div>
    </ng-container>

    <div class="form-group">
        <label for="recorrencia">Recorrência</label>
        <select id="recorrencia" formControlName="recorrencia">
            <option *ngFor="let rec of recorrencias" [ngValue]="rec">{{ rec }}</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="descricao">Descrição (Opcional)</label>
        <textarea id="descricao" formControlName="descricao"></textarea>
    </div>

     <div class="form-actions">
            <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancelar</button>
            <button type="submit" class="btn btn-primary" [disabled]="contaForm.invalid">Salvar</button>
            
        </div>
</form>
</div>
