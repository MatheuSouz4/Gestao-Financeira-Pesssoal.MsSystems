<div class="relatorios-container">
  <div class="header">
    <h2>Central de Relatórios</h2>
    <p>Exporte seus dados financeiros para análise externa</p>
  </div>

  <div class="card-filtro">
    <div class="form-grid">
      <div class="form-group campo-largo">
        <label>Tipo de Relatório</label>
        <select [(ngModel)]="filtro.tipo" class="form-control">
          <option *ngFor="let tipo of tiposRelatorio" [value]="tipo.valor">
            {{ tipo.label }}
          </option>
        </select>
      </div>

      <div class="form-group">
        <label>Data Início</label>
        <input type="date" [(ngModel)]="filtro.dataInicio" class="form-control">
      </div>

      <div class="form-group">
        <label>Data Fim</label>
        <input type="date" [(ngModel)]="filtro.dataFim" class="form-control">
      </div>
    </div>

    <div class="acoes-container">
      <button class="btn btn-csv" (click)="gerarRelatorio('csv')" [disabled]="isProcessando">
        <i class="fa fa-file-excel-o"></i> Exportar para CSV
      </button>
      
      <button class="btn btn-pdf" (click)="gerarRelatorio('pdf')" [disabled]="isProcessando">
        <i class="fa fa-file-pdf-o"></i> Exportar para PDF
      </button>
    </div>
  </div>
</div>
