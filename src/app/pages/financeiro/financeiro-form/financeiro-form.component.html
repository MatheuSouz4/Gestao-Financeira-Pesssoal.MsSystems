<div class="form-container">
    <h3>{{ financeiroEdicao ? 'Editar Lançamento' : 'Novo Lançamento' }}</h3>
    <hr>

    <form [formGroup]="financeiroForm" (ngSubmit)="onSubmit()">
        
        <div class="form-group">
            <label for="contaId">Conta</label>
            <select id="contaId" formControlName="contaId" class="form-control"
                    [ngClass]="{'is-invalid': financeiroForm.get('contaId')?.invalid && financeiroForm.get('contaId')?.touched}">
                <option value="" disabled>Selecione uma conta...</option>
                <option *ngFor="let conta of contas" [value]="conta.id">
                    {{ conta.nome }} ({{ conta.tipo }})
                </option>
            </select>
            <small class="error-text" *ngIf="financeiroForm.get('contaId')?.invalid && financeiroForm.get('contaId')?.touched">
                A seleção da conta é obrigatória.
            </small>
        </div>

        <div class="form-group">
            <label for="descricao">Descrição</label>
            <input type="text" id="descricao" formControlName="descricao" class="form-control" 
                   placeholder="Ex: Pagamento de Fornecedor, Salário..."
                   [ngClass]="{'is-invalid': financeiroForm.get('descricao')?.invalid && financeiroForm.get('descricao')?.touched}">
            <small class="error-text" *ngIf="financeiroForm.get('descricao')?.invalid && financeiroForm.get('descricao')?.touched">
                A descrição é obrigatória.
            </small>
        </div>

        <div class="form-row">
            <div class="form-group half-width">
                <label for="vencimento">Data de Vencimento</label>
                <input type="date" id="vencimento" formControlName="vencimento" class="form-control"
                       [ngClass]="{'is-invalid': financeiroForm.get('vencimento')?.invalid && financeiroForm.get('vencimento')?.touched}">
                <small class="error-text" *ngIf="financeiroForm.get('vencimento')?.invalid && financeiroForm.get('vencimento')?.touched">
                    Data inválida.
                </small>
            </div>

            <div class="form-group half-width">
                <label for="valor">Valor (R$)</label>
                <input type="number" step="0.01" id="valor" formControlName="valor" class="form-control"
                       placeholder="0.00"
                       [ngClass]="{'is-invalid': financeiroForm.get('valor')?.invalid && financeiroForm.get('valor')?.touched}">
                <small class="error-text" *ngIf="financeiroForm.get('valor')?.invalid && financeiroForm.get('valor')?.touched">
                    Valor deve ser maior que zero.
                </small>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" class="btn btn-secondary" (click)="onCancelar()">Cancelar</button>
            <button type="submit" class="btn btn-primary" [disabled]="financeiroForm.invalid">
                <i class="material-icons">save</i> Salvar
            </button>
        </div>
    </form>
</div>
