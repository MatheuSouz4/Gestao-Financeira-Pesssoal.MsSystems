<div class="form-container">
    <h3>Quitar Lançamento</h3>
    <hr>
    
    <div class="info-resumo">
        <p><strong>Conta:</strong> {{ lancamento?.nomeConta }}</p>
        <p><strong>Descrição:</strong> {{ lancamento?.descricao || 'Sem descrição' }}</p>
    </div>

    <form [formGroup]="quitacaoForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label>Data do Pagamento</label>
            <input type="date" formControlName="dataPagamento" class="form-control">
        </div>

        <div class="form-group">
            <label>Valor Pago (R$)</label>
            <input type="number" step="0.01" formControlName="valorPago" class="form-control">
        </div>

        <div class="form-group">
            <label>Comprovante (Opcional)</label>
            <input type="file" (change)="onFileChange($event)" class="form-control" accept="image/*,application/pdf">
            <small class="text-muted">Formatos: PDF ou Imagem</small>
        </div>

        <div class="form-actions">
            <button type="button" class="btn btn-secondary" (click)="fechar.emit()">Cancelar</button>
            <button type="submit" class="btn btn-success" [disabled]="quitacaoForm.invalid">
                <i class="material-icons"></i> Confirmar Pagamento
            </button>
        </div>
    </form>
</div>
