<div class="financeiro-page"> 
    <h2>Gestão Financeira</h2>

    <div class="top-actions">
        <div class="search-bar">
            <input 
                type="text" 
                placeholder="Pesquisar por conta, descrição ou status..."
                [(ngModel)]="termoPesquisa" 
                (ngModelChange)="aplicarFiltro()">
            <i class="material-icons search-icon"></i>
        </div>

        <button class="btn btn-primary" (click)="abrirFormularioCadastro()">
            <i class="material-icons"></i> Adicionar Novo Lançamento
        </button>
    </div>

    <div class="contas-list">
        <table *ngIf="financeirosFiltrados.length > 0">
            <thead>
                <tr>
                    <th class="col-conta">Conta</th>
                    <th class="col-descricao">Descrição</th>
                    <th class="col-vencimento">Vencimento</th>
                    <th class="col-valor">Valor</th>
                    <th class="col-status">Status</th>
                    <th class="col-acoes">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let f of financeirosFiltrados">
                    <td>{{ f.nomeConta }}</td>
                    <td>{{ f.descricao || '--' }}</td>
                    
                    <td>
                        <div class="timeline-wrapper" 
                            [ngClass]="getCorTimeline(f.dataVencimento)"
                            [title]="'Vencimento: ' + (f.dataVencimento | date:'dd/MM/yyyy')">
                            
                            <div class="timeline-track"></div>
                            
                            <div class="timeline-marker" 
                                [style.left.%]="getProgressoVencimento(f.dataVencimento)">
                                <span class="timeline-label">{{ f.dataVencimento | date:'dd/MM/yy' }}</span>
                                <div class="marker-dot"></div>
                            </div>
                        </div>
                    </td>

                    <td class="valor-celula">{{ f.valor | currency:'BRL' }}</td>
                    
                    <td>
                        <span [ngClass]="{
                            'status-PAGA': f.statusReal === 'PAGA',
                            'status-PENDENTE': f.statusReal === 'PENDENTE',
                            'status-VENCIDA': f.statusReal === 'VENCIDA'
                        }">{{ f.statusReal }}</span>
                    </td>

                    <td class="acoes-celula">
                        <button class="btn btn-icon" title="Editar" (click)="editarFinanceiro(f)">
                            <i class="material-icons">Editar</i>
                        </button>
                        <button *ngIf="f.statusReal !== 'PAGA'" class="btn btn-icon btn-success" title="Quitar">
                            <i class="material-icons">Quitar</i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>

        <p *ngIf="financeirosFiltrados.length === 0" class="no-results">Nenhum registro financeiro encontrado.</p>
    </div>

    <div *ngIf="isFormularioAberto" class="form-modal-overlay">
        <div class="form-card">
            <app-financeiro-form
                [financeiroEdicao]="financeiroEmEdicao"
                (salvar)="salvarFinanceiro($event)"
                (fechar)="fecharFormulario()">
            </app-financeiro-form>
        </div>
    </div>
</div>
